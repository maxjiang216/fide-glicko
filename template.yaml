AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: FIDE Glicko scraping pipeline - Lambdas and Step Functions

Parameters:
  DataBucket:
    Type: String
    Default: fide-glicko
    Description: S3 bucket for scraped data and Lambda deployment artifacts

  PipelineConfigSsmParam:
    Type: String
    Default: /fide-glicko/pipeline/config
    Description: >
      SSM String parameter name (JSON object) for pipeline tuning. Create or edit
      in AWS Console (Parameter Store) without redeploying. Omitted execution
      input keys are filled from this object; see infra/step-function/README.md.

Globals:
  Function:
    Timeout: 60
    MemorySize: 256
    Architectures:
      - x86_64

Resources:
  EnsureRunNameFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fide-glicko-ensure-run-name
      Runtime: python3.12
      CodeUri: .functions/ensure_run_name
      Handler: handlers.ensure_run_name.lambda_handler
      Timeout: 10
      MemorySize: 128
      Description: Normalize run_name for pipeline (prod=YYYY-MM, custom=required, test=default)
      Environment:
        Variables:
          PIPELINE_CONFIG_SSM_PARAM: !Ref PipelineConfigSsmParam
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${PipelineConfigSsmParam}

  FederationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fide-glicko-federations
      Runtime: python3.12
      CodeUri: .functions/federations
      Handler: handlers.federations.lambda_handler
      Timeout: 60
      MemorySize: 128
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Description: Fetch FIDE federation list

  TournamentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fide-glicko-tournaments
      Runtime: python3.12
      CodeUri: .functions/tournaments
      Handler: handlers.tournaments.lambda_handler
      Timeout: 900
      MemorySize: 256
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Description: Fetch tournament IDs per federation

  # Shared Docker image: SAM tags builds lambdaimage-<hash>-data (logical ID LambdaImage = first alphabetically in this group).
  LambdaImage:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: .
      Dockerfile: docker/Dockerfile
      DockerTag: data
    Properties:
      FunctionName: fide-glicko-player-list
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.player_list.lambda_handler
      Timeout: 300
      MemorySize: 2560
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Description: Fetch FIDE player list XML

  LambdaImageDetailsChunk:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: .
      Dockerfile: docker/Dockerfile
      DockerTag: data
    Properties:
      FunctionName: fide-glicko-details-chunk
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.details_chunk.lambda_handler
      Timeout: 900
      MemorySize: 512
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Description: Scrape tournament details for a chunk

  LambdaImageReportsChunk:
    Type: AWS::Serverless::Function

    Metadata:
      DockerContext: .
      Dockerfile: docker/Dockerfile
      DockerTag: data
    Properties:
      FunctionName: fide-glicko-reports-chunk
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.reports_chunk.lambda_handler
      Timeout: 900
      MemorySize: 1024
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Description: Scrape tournament reports for a chunk

  LambdaImageMergeChunks:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: .
      Dockerfile: docker/Dockerfile
      DockerTag: data
    Properties:
      FunctionName: fide-glicko-merge-chunks
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.merge_chunks.lambda_handler
      Timeout: 300
      MemorySize: 2048
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Description: Merge detail and report chunks into single parquet files

  LambdaImageValidate:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: .
      Dockerfile: docker/Dockerfile
      DockerTag: data
    Properties:
      FunctionName: fide-glicko-validate
      PackageType: Image
      ImageConfig:
        Command:
          - handlers.validate.lambda_handler
      Timeout: 300
      MemorySize: 1536
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Description: Validate pipeline data consistency

  SplitIdsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fide-glicko-split-ids
      Runtime: python3.12
      CodeUri: .functions/split_ids
      Handler: handlers.split_ids.lambda_handler
      Timeout: 120
      MemorySize: 256
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref DataBucket
      Description: Split tournament IDs into chunks

  PipelineStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: fide-glicko-pipeline
      DefinitionUri: infra/step-function/pipeline.asl.json
      DefinitionSubstitutions:
        EnsureRunNameFunctionArn: !GetAtt EnsureRunNameFunction.Arn
        FederationsFunctionArn: !GetAtt FederationsFunction.Arn
        TournamentsFunctionArn: !GetAtt TournamentsFunction.Arn
        PlayerListFunctionArn: !GetAtt LambdaImage.Arn
        SplitIdsFunctionArn: !GetAtt SplitIdsFunction.Arn
        DetailsChunkFunctionArn: !GetAtt LambdaImageDetailsChunk.Arn
        ReportsChunkFunctionArn: !GetAtt LambdaImageReportsChunk.Arn
        MergeChunksFunctionArn: !GetAtt LambdaImageMergeChunks.Arn
        ValidateFunctionArn: !GetAtt LambdaImageValidate.Arn
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !GetAtt EnsureRunNameFunction.Arn
                - !GetAtt FederationsFunction.Arn
                - !GetAtt TournamentsFunction.Arn
                - !GetAtt LambdaImage.Arn
                - !GetAtt SplitIdsFunction.Arn
                - !GetAtt LambdaImageDetailsChunk.Arn
                - !GetAtt LambdaImageReportsChunk.Arn
                - !GetAtt LambdaImageMergeChunks.Arn
                - !GetAtt LambdaImageValidate.Arn

Outputs:
  PipelineStateMachineArn:
    Description: Step Functions state machine ARN
    Value: !Ref PipelineStateMachine
    Export:
      Name: !Sub "${AWS::StackName}-PipelineArn"

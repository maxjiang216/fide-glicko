# Deploy merge chunks Lambda to AWS when relevant files change.
#
# Same OIDC/secret setup as deploy-federations-lambda.
#
name: Deploy Merge Chunks Lambda

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/deploy-merge-chunks-lambda.yml"
      - "src/scraper/merge_chunks.py"
      - "src/scraper/s3_io.py"
      - "handlers/merge_chunks.py"
      - "infra/deploy_merge_chunks_lambda.sh"
      - "pyproject.toml"
  pull_request:
    paths:
      - "src/scraper/merge_chunks.py"
      - "src/scraper/s3_io.py"
      - "handlers/merge_chunks.py"
      - "infra/deploy_merge_chunks_lambda.sh"
      - ".github/workflows/deploy-merge-chunks-lambda.yml"
      - "pyproject.toml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to AWS (false = build only, no AWS needed)"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Build and deploy Lambda
        env:
          LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
        run: |
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.deploy }}" == "true" ]]; then
            bash infra/deploy_merge_chunks_lambda.sh
          else
            bash infra/deploy_merge_chunks_lambda.sh --zip-only
          fi

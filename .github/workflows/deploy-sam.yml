# Deploy FIDE Glicko stack via SAM (Lambdas + Step Function).
#
# Replaces individual Lambda deploy workflows. Single declarative deploy.
#
# Replaces individual Lambda deploy workflows.
# Ensure AWS_ROLE_ARN has: cloudformation:*, s3:*, lambda:*, iam:*, states:*
#
name: Deploy SAM

on:
  push:
    branches: [main, master]
    paths:
      - "template.yaml"
      - "samconfig.toml"
      - "requirements.txt"
      - "handlers/**"
      - "src/scraper/**"
      - "infra/**"
      - "docker/**"
      - "scripts/**"
      - ".github/workflows/deploy-sam.yml"
  pull_request:
    paths:
      - "template.yaml"
      - "samconfig.toml"
      - "requirements.txt"
      - "handlers/**"
      - "src/scraper/**"
      - "infra/**"
      - "docker/**"
      - "scripts/**"
      - ".github/workflows/deploy-sam.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to AWS (false = build only)"
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SAM CLI
        run: |
          curl -Lo sam.zip "https://github.com/aws/aws-sam-cli/releases/latest/download/aws-sam-cli-linux-x86_64.zip"
          unzip sam.zip -d sam-install
          sudo ./sam-install/install --update
          sam --version

      - name: Install dependencies
        run: pip install -e .

      - name: Configure AWS credentials
        if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event.inputs.deploy == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Sync deploy policy from repo
        if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event.inputs.deploy == 'true'
        env:
          ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          ROLE_NAME=$(echo "$ROLE_ARN" | sed -n 's|.*/\([^/]*\)$|\1|p')
          sed "s|__DEPLOY_ROLE_ARN__|$ROLE_ARN|g" infra/github-deploy-policy.json > /tmp/deploy-policy.json
          aws iam put-role-policy --role-name "$ROLE_NAME" --policy-name GithubDeploy --policy-document file:///tmp/deploy-policy.json
          echo "Synced infra/github-deploy-policy.json to role $ROLE_NAME"

      - name: Prepare per-function directories
        run: bash scripts/prepare_functions.sh

      - name: Ensure ECR repositories exist
        if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event.inputs.deploy == 'true'
        run: bash scripts/ensure_ecr_repos.sh

      - name: SAM build
        run: sam build --cached

      - name: SAM validate
        run: sam validate --region ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Validate Step Function (static)
        run: pytest tests/test_step_function.py -v

      - name: Validate Step Function definition
        if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event.inputs.deploy == 'true'
        run: |
          pip install boto3 --quiet
          python -c "
          import json
          import boto3
          import sys

          with open('infra/step-function/pipeline.asl.json') as f:
              definition = f.read()

          placeholder = 'arn:aws:lambda:${{ vars.AWS_REGION || 'us-east-1' }}:123456789012:function:placeholder'
          for var in ['EnsureRunNameFunctionArn', 'FederationsFunctionArn', 'TournamentsFunctionArn', 'PlayerListFunctionArn',
                      'SplitIdsFunctionArn', 'DetailsChunkFunctionArn', 'ReportsChunkFunctionArn',
                      'MergeChunksFunctionArn', 'ValidateFunctionArn']:
              definition = definition.replace('\${' + var + '}', placeholder)

          client = boto3.client('stepfunctions', region_name='${{ vars.AWS_REGION || 'us-east-1' }}')
          resp = client.validate_state_machine_definition(definition=definition)
          if resp['result'] != 'OK':
              print('Validation failed:', resp.get('diagnostics', []))
              sys.exit(1)
          print('Step Function definition valid (result=OK)')
          "

      - name: Migrate Lambda logical ID rename (one-time, PR #73)
        if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
        run: |
          # PR #73 renamed logical IDs (PlayerListFunction → LambdaImage, etc.) while keeping the
          # same FunctionNames. CF tracks physical resource names per logical ID, so it refuses to
          # create a new resource with a name already owned by the stack under a different ID —
          # even after the Lambda is deleted from AWS. The only fix is to delete the whole stack
          # so CF loses its internal ownership records, then SAM recreates everything fresh.
          if aws cloudformation describe-stack-resource \
              --stack-name fide-glicko \
              --logical-resource-id PlayerListFunction \
              --region "${AWS_REGION}" 2>/dev/null; then
            echo "Old logical IDs detected — deleting stack for clean rename migration..."
            aws cloudformation delete-stack --stack-name fide-glicko --region "${AWS_REGION}"
            aws cloudformation wait stack-delete-complete --stack-name fide-glicko --region "${AWS_REGION}"
            echo "Stack deleted — SAM will recreate it fresh"
          else
            echo "Migration not needed — old logical IDs are gone"
          fi
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Delete ROLLBACK_COMPLETE stack before SAM deploy
        if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event.inputs.deploy == 'true'
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name fide-glicko \
            --region "${AWS_REGION}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || true)

          if [ "${STACK_STATUS}" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack fide-glicko is in ROLLBACK_COMPLETE; deleting so SAM can recreate it"
            aws cloudformation delete-stack --stack-name fide-glicko --region "${AWS_REGION}"
            aws cloudformation wait stack-delete-complete --stack-name fide-glicko --region "${AWS_REGION}"
          else
            echo "Stack fide-glicko status is ${STACK_STATUS:-MISSING}; no rollback cleanup needed"
          fi
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: SAM changeset preview (PR only)
        if: github.event_name == 'pull_request'
        run: sam deploy --no-execute-changeset --no-fail-on-empty-changeset
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: SAM deploy
        if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
        run: sam deploy --no-confirm-changeset
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
